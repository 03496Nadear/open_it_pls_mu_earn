<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>For you 💖</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: linear-gradient(to top, #ffc0cb, #ffe4e1);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: sans-serif;
}

/* ปุ่ม */
.button {
  padding: 20px 40px;
  font-size: 22px;
  color: white;
  background: #ff69b4;
  border: none;
  border-radius: 30px;
  text-decoration: none;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  transition: 0.3s;
  z-index: 10;
}

.button:hover {
  transform: scale(1.1);
  background: #ff1493;
}

/* หัวใจ */
.heart {
  position: absolute;
  color: #ff69b4;
  font-size: 20px;
  animation: floatUp linear infinite;
}

@keyframes floatUp {
  from {
    transform: translateY(100vh);
    opacity: 1;
  }
  to {
    transform: translateY(-10vh);
    opacity: 0;
  }
}
</style>
</head>

<body>

<a class="button" href="https://docs.google.com/document/d/1uTrNepFZcPZgVKqBzJm1Wzc1MXBl9DbLvoJjACuOUhU/export?format=pdf">ใครชื่อเอินกดปุ่มนี้ ! 💌</a>

<script>
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "💖";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 20 + 15) + "px";
  heart.style.animationDuration = (Math.random() * 3 + 3) + "s";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 6000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
